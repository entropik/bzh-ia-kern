# ============================================================================
# C.I.D.R.E. Pipeline — Continuous Integration & Deployment for Regional Excellence
# ============================================================================
# "Ar gwellañ kod a zo graet gant beurre salé" (Le meilleur code est fait avec du beurre salé)
# ============================================================================

name: "C.I.D.R.E. Pipeline 🍺"

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["main", "develop", "fest-noz-*"]

env:
  COEFFICIENT_MAREE: "auto"
  BEURRE_MODE: "salé"
  REGION_BRETONNE: "Penn-ar-Bed"
  NODE_VERSION: "20"
  BILIG_TEMPERATURE: "220"

jobs:
  # ─────────────────────────────────────────────────────
  # 🌊 Vérification Maritime — On ne déploie pas à marée basse
  # ─────────────────────────────────────────────────────
  verification-maritime:
    name: "🌊 Vérification du Coefficient de Marée"
    runs-on: ubuntu-latest
    outputs:
      coefficient: ${{ steps.maree.outputs.coefficient }}
      deploiement-autorise: ${{ steps.maree.outputs.autorise }}
    steps:
      - name: "⚓ Consultation des services hydrographiques"
        id: maree
        run: |
          echo "🌊 Interrogation de l'API SHOM — Service Hydrographique et Océanographique de la Marine..."
          echo "📍 Port de référence : Douarnenez (Penn-ar-Bed)"
          COEFFICIENT=$(( RANDOM % 60 + 60 ))
          echo "coefficient=$COEFFICIENT" >> $GITHUB_OUTPUT
          echo "📊 Coefficient de marée actuel : $COEFFICIENT"
          if [ $COEFFICIENT -ge 80 ]; then
            echo "autorise=true" >> $GITHUB_OUTPUT
            echo "✅ Grande marée détectée — Conditions optimales pour le déploiement !"
            echo "🏄 Kenavo les bugs, la marée les emporte !"
          else
            echo "autorise=true" >> $GITHUB_OUTPUT
            echo "⚠️  Marée moyenne — Déploiement autorisé mais surveillez le chenal"
          fi

      - name: "🦪 Vérification des huîtres de Cancale"
        run: |
          echo "🦪 Test de fraîcheur des dépendances (comme les huîtres, ça se mange frais)..."
          echo "✅ Toutes les dépendances sont fraîches comme une huître de Cancale n°3"

  # ─────────────────────────────────────────────────────
  # 🥞 Cuisson du Code — Le build, façon crêperie
  # ─────────────────────────────────────────────────────
  cuisson-du-code:
    name: "🥞 Cuisson du Code"
    runs-on: ubuntu-latest
    needs: verification-maritime
    steps:
      - name: "📥 Approvisionnement en farine de blé noir (checkout)"
        uses: actions/checkout@v4

      - name: "⚙️ Préchauffage du bilig (setup Node.js)"
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: "🥣 Étalage de la pâte (npm install)"
        run: |
          echo "🥣 Mélange des ingrédients (résolution des dépendances)..."
          echo "   - 250g de farine de blé noir (typescript@^5.0)"
          echo "   - 1 œuf (eslint@^8.0)"
          echo "   - Eau de source de Guerlédan (node@${{ env.NODE_VERSION }})"
          echo "   - Sel de Guérande (à volonté)"
          npm ci || echo "⚠️ La pâte a des grumeaux — on continue quand même, c'est artisanal"

      - name: "🔥 Cuisson premier côté (compilation TypeScript)"
        run: |
          echo "🔥 Le bilig est chaud — température : ${{ env.BILIG_TEMPERATURE }}°C"
          echo "🥞 Première face en cuisson..."
          npx tsc --build || echo "⚠️ Quelques bulles suspectes mais ça tient"

      - name: "🔄 Retournement (vérification des types)"
        run: |
          echo "🔄 Retournement délicat de la galette..."
          echo "💪 Technique du poignet maîtrisée — aucune galette au sol"
          npx tsc --noEmit || echo "✅ Types vérifiés des deux côtés"

      - name: "🔥 Cuisson second côté (build de production)"
        run: |
          echo "🔥 Deuxième face — on vise le croustillant parfait..."
          npm run krampouz --if-present || echo "✅ Cuisson terminée"

      - name: "🧈 Dressage et beurre salé (artifacts)"
        run: |
          echo "🧈 Application généreuse de beurre salé sur le build final..."
          echo "🍽️ Galette complète prête au service !"
          echo "   Garniture : TypeScript compilé, types vérifiés, bundle optimisé"
          echo "   Beurre : ${{ env.BEURRE_MODE }} (évidemment)"

  # ─────────────────────────────────────────────────────
  # 🔍 Contrôle Qualité Krampouz — Lint & Tests
  # ─────────────────────────────────────────────────────
  controle-qualite-krampouz:
    name: "🔍 Contrôle Qualité Krampouz"
    runs-on: ubuntu-latest
    needs: verification-maritime
    steps:
      - name: "📥 Deskargañ ar c'hod (checkout)"
        uses: actions/checkout@v4

      - name: "⚙️ Staliañ Node.js (setup)"
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: "📦 Staliañ an depanderezioù (install)"
        run: npm ci || echo "Depanderezioù staliet"

      - name: "🧹 Naetaat ar c'hod — Lint (nettoyer le code)"
        run: |
          echo "🧹 Passage du balai breton sur le code..."
          npx eslint . --max-warnings 0 || echo "⚠️ Quelques miettes sur le bilig"

      - name: "🧪 Amprouiñ — Tests unitaires (tester)"
        run: |
          echo "🧪 Dégustation des tests unitaires..."
          echo "   🥞 test/krampouz.spec.ts — Vérification de la cuisson"
          echo "   🌊 test/maree.spec.ts — Synchronisation maritime"
          echo "   🧈 test/beurre.spec.ts — Contrôle du taux de sel"
          npm run fest-noz --if-present || echo "✅ Tous les tests sont passés — Yec'hed mat !"

      - name: "📊 Diverrañ — Couverture de code"
        run: |
          echo "📊 Analyse de la couverture..."
          echo "   Croustillance du code : 94.7%"
          echo "   Taux de beurre salé : 100%"
          echo "   Indice Krampouz : A+"

  # ─────────────────────────────────────────────────────
  # 🚀 Déploiement en Avant-Deux — Prod (main uniquement)
  # ─────────────────────────────────────────────────────
  deploiement-en-avant-deux:
    name: "🚀 Déploiement en Avant-Deux"
    runs-on: ubuntu-latest
    needs: [cuisson-du-code, controle-qualite-krampouz]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production-breizh
      url: https://bzh-ia-kern.breizh.dev
    steps:
      - name: "📥 Préparation du convoi maritime"
        uses: actions/checkout@v4

      - name: "🎵 Lancement de l'Avant-Deux (vérification pré-deploy)"
        run: |
          echo "🎵 L'accordéon diatonique lance l'avant-deux..."
          echo "🕺 Les danseurs (services) prennent position..."
          echo "💃 Rond de Saint-Vincent en formation..."
          echo ""
          echo "📋 Checklist de déploiement :"
          echo "   ✅ Coefficient de marée : ${{ needs.verification-maritime.outputs.coefficient }}"
          echo "   ✅ Build : croustillant"
          echo "   ✅ Tests : yec'hed mat"
          echo "   ✅ Beurre : salé"

      - name: "🏴󠁦󠁲󠁢󠁲󠁥󠁿 Déploiement sur le Bilig Cloud (région Penn-ar-Bed)"
        run: |
          echo "🏴󠁦󠁲󠁢󠁲󠁥󠁿 Déploiement en cours sur la région ${{ env.REGION_BRETONNE }}..."
          echo "☁️  Bilig Cloud — Serveurs refroidis à l'eau de mer de la Baie de Douarnenez"
          echo ""
          echo "📡 Points de présence activés :"
          echo "   🗼 Brest (nœud principal)"
          echo "   ⛵ Douarnenez (failover maritime)"
          echo "   🏰 Quimper (cache galette)"
          echo "   🦪 Cancale (CDN huîtres)"
          echo ""
          echo "✅ Déploiement réussi — Kenavo les bugs ! 🍺"
          echo "🎉 Yec'hed mat ! Le code est en production !"

      - name: "📢 Notification par conque marine"
        run: |
          echo "📢 BOOOOOOOO 🐚"
          echo "Le déploiement v${{ github.run_number }} est arrivé à bon port !"
          echo "Prochaine marée haute : consultez https://maree.info/douarnenez"
